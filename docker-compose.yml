services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-sql
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  productservice:
    build:
      context: ./services/ProductService
    container_name: product-service
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_PRODUCT}
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5100:8080"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  inventoryservice:
    build:
      context: ./services/InventoryService
    container_name: inventory-service
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_INVENTORY}
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5600:8080"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  pricingservice:
    build:
      context: ./services/PricingService
    container_name: pricing-service
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_PRICING}
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5700:8080"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  orderservice:
    build:
      context: ./services/OrderService
    container_name: order-service
    depends_on:
      sqlserver:
        condition: service_healthy
      productservice:
        condition: service_healthy
      inventoryservice:
        condition: service_healthy
      pricingservice:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_ORDER}
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5200:8080"
    networks:
      - ecommerce-network

  customerservice:
    build:
      context: ./services/CustomerService
    container_name: customer-service
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_CUSTOMER}
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5300:8080"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s  

  notificationservice:
    build:
      context: ./services/NotificationService
    container_name: notification-service
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_NOTIFICATION}
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5400:8080"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s  

networks:
  ecommerce-network:

volumes:
  sql_data: