services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-sql
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - ecommerce-network

  productservice:
    build:
      context: ./services/ProductService
    container_name: product-service
    depends_on:
      - sqlserver
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_PRODUCT}
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5100:8080"
    networks:
      - ecommerce-network

  orderservice:
    build:
      context: ./services/OrderService
    container_name: order-service
    depends_on:
      - sqlserver
      - productservice
      - inventoryservice
      - pricingservice
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_ORDER}
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5200:8080"
    networks:
      - ecommerce-network

  customerservice:
    build:
      context: ./services/CustomerService
    container_name: customer-service
    depends_on:
      - sqlserver
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_CUSTOMER}
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5300:8080"
    networks:
      - ecommerce-network

  notificationservice:
    build:
      context: ./services/NotificationService
    container_name: notification-service
    depends_on:
      - sqlserver
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_NOTIFICATION}
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5400:8080"
    networks:
      - ecommerce-network

  inventoryservice:
    build:
      context: ./services/InventoryService
    container_name: inventory-service
    depends_on:
      - sqlserver
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_INVENTORY}
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5600:8080"
    networks:
      - ecommerce-network

  pricingservice:
    build:
      context: ./services/PricingService
    container_name: pricing-service
    depends_on:
      - sqlserver
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_PRICING}
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5700:8080"
    networks:
      - ecommerce-network

networks:
  ecommerce-network:

volumes:
  sql_data: